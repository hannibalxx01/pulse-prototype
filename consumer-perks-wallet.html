<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=430">
<title>Pulse — Perks Wallet</title>
<link rel="stylesheet" href="pulse-design.css">
</head>
<body>
<div class="app-shell">
  <div class="app-shell-body">
    <main class="screen">
      <div style="padding:12px 20px 6px;">
        <div style="font-size:10px;color:var(--fg3);letter-spacing:0.08em;text-transform:uppercase;">Singapore</div>
        <div style="font-family:'DM Serif Display',serif;font-size:26px;color:var(--fg);">Perks Wallet</div>
      </div>

      <div class="scroll-body" style="padding-top:4px;">
        <div class="section-label" style="padding:0;margin-top:0;">ACTIVE — 1 PERK</div>

        <div style="background:linear-gradient(135deg,#1E2D20,#131D14);border:1.5px solid rgba(93,202,165,0.3);border-radius:var(--r-lg);padding:16px;margin-bottom:14px;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;">
            <div>
              <div style="font-size:11px;font-weight:700;color:var(--green);letter-spacing:0.06em;margin-bottom:4px;">● VALID NOW</div>
              <div style="font-size:17px;font-weight:800;color:var(--fg);">Free welcome drink</div>
              <div style="font-size:12px;color:var(--fg3);margin-top:3px;">Amber Rooftop · Tonight</div>
            </div>
            <div style="font-size:28px;">🍹</div>
          </div>
          <div style="text-align:center;margin-bottom:10px;">
            <div style="font-size:28px;font-weight:800;color:var(--amber);letter-spacing:3px;">PSL-4821</div>
            <div style="font-size:11px;color:var(--fg3);margin-top:5px;">Show this code at the door</div>
          </div>
          <button class="btn btn-ghost btn-sm">↗ Copy code</button>
        </div>

        <div class="section-label" style="padding:0;">USED PERKS</div>

        <div style="display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--border);opacity:0.55;">
          <div style="width:42px;height:42px;background:var(--slate);border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;border:1px solid var(--border);">⚡</div>
          <div style="flex:1;">
            <div style="font-size:13px;font-weight:600;color:var(--fg);">Skip the queue</div>
            <div style="font-size:11px;color:var(--fg3);margin-top:2px;">Void Club · Sat, 4 Jul</div>
          </div>
          <div style="font-size:10px;font-weight:700;color:var(--fg3);letter-spacing:0.05em;">USED</div>
        </div>

        <div style="display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--border);opacity:0.55;">
          <div style="width:42px;height:42px;background:var(--slate);border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;border:1px solid var(--border);">🎁</div>
          <div style="flex:1;">
            <div style="font-size:13px;font-weight:600;color:var(--fg);">Free shot on arrival</div>
            <div style="font-size:11px;color:var(--fg3);margin-top:2px;">Blue Note Bar · Fri, 3 Jul</div>
          </div>
          <div style="font-size:10px;font-weight:700;color:var(--fg3);letter-spacing:0.05em;">USED</div>
        </div>
      </div>
    </main>
  </div>
  <nav class="app-nav">
    <a href="consumer-map.html"><span>🗺</span><span class="label">Map</span></a>
    <a href="consumer-explore.html"><span>🔍</span><span class="label">Explore</span></a>
    <a href="consumer-perks-wallet.html" class="active"><span>🎁</span><span class="label">Perks</span></a>
    <a href="#"><span>👤</span><span class="label">Account</span></a>
  </nav>
</div>
</body>
</html>
