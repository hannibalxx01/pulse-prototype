<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=430">
<title>Pulse — New Event · Step 2</title>
<link rel="stylesheet" href="pulse-design.css">
</head>
<body>
<main class="screen">
  <div class="topnav">
    <a class="topnav-back" href="venue-events-new-step1.html">←</a>
    <div class="topnav-title">New Event</div>
    <span style="font-size:11px;color:var(--fg3);">2 / 3</span>
  </div>

  <div style="padding:0 20px 8px;">
    <div class="step-row">
      <div class="step-dot done">✓</div>
      <div class="step-line done"></div>
      <div class="step-dot active">2</div>
      <div class="step-line"></div>
      <div class="step-dot todo">3</div>
    </div>
  </div>

  <div class="scroll-body" style="padding-top:4px;">
    <div style="display:flex;flex-direction:column;gap:18px;">
      <div style="font-family:'DM Serif Display',serif;font-size:22px;color:var(--fg);">Event Details</div>

      <div class="input-group">
        <label class="input-label">Event name <span style="font-weight:400;opacity:0.5;">(optional)</span></label>
        <input class="input" value="Happy Hour" readonly>
      </div>

      <div class="input-group">
        <label class="input-label">Venue address</label>
        <div style="width:100%;height:50px;border-radius:var(--r-md);background:var(--green2);border:1.5px solid rgba(93,202,165,0.4);color:var(--green);font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;">
          📍 30 Boat Quay, Singapore
        </div>
        <div style="display:flex;align-items:center;gap:6px;">
          <div style="width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0;"></div>
          <div style="font-size:11px;color:var(--green);font-weight:600;">Location confirmed</div>
          <div style="font-size:10px;color:var(--fg3);margin-left:4px;">1.2871, 103.8500</div>
        </div>
      </div>

      <div class="input-group">
        <label class="input-label">Date</label>
        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;">
          <div class="date-chip sel"><div class="dc-label">Tonight</div><div class="dc-sub">Tue, 7 Jul</div></div>
          <div class="date-chip"><div class="dc-label">Tomorrow</div><div class="dc-sub">Wed, 8 Jul</div></div>
          <div class="date-chip"><div class="dc-label">This Friday</div><div class="dc-sub">Fri, 10 Jul</div></div>
          <div class="date-chip"><div class="dc-label">Pick date →</div><div class="dc-sub">Calendar</div></div>
        </div>
      </div>

      <div class="input-group">
        <label class="input-label">Time</label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
          <div>
            <div style="font-size:10px;color:var(--fg3);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:5px;">Starts</div>
            <input class="input" value="20:00" readonly>
          </div>
          <div>
            <div style="font-size:10px;color:var(--fg3);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:5px;">Ends</div>
            <input class="input" value="23:00" readonly>
          </div>
        </div>
      </div>

      <div class="input-group">
        <label class="input-label">Max seats</label>
        <div class="stepper">
          <button class="stepper-btn">−</button>
          <div class="stepper-val">60</div>
          <button class="stepper-btn">+</button>
        </div>
        <div style="font-size:11px;color:var(--fg3);margin-top:6px;">Users see a live fill bar as seats are taken.</div>
      </div>

      <div class="input-group">
        <label class="input-label">Description <span style="font-weight:400;opacity:0.5;">(optional)</span></label>
        <textarea class="textarea" rows="2">Golden-hour cocktails with a skyline view.</textarea>
      </div>
    </div>
  </div>

  <div style="padding:12px 20px;background:rgba(13,17,23,0.96);border-top:1px solid var(--border);">
    <a class="btn btn-primary" href="venue-events-new-step3.html">Next — Add Perk →</a>
  </div>
</main>
</body>
</html>
