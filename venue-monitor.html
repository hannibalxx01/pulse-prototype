<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=430">
<title>Pulse — Live Monitor</title>
<link rel="stylesheet" href="pulse-design.css">
</head>
<body>
<main class="screen">
  <div class="topnav">
    <a class="topnav-back" href="venue-dashboard.html">←</a>
    <div class="topnav-title">Happy Hour</div>
    <span style="font-size:9px;font-weight:700;color:var(--green);background:var(--green2);padding:3px 8px;border-radius:99px;letter-spacing:0.05em;">● LIVE</span>
  </div>

  <div class="scroll-body">
    <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px 16px;margin-bottom:12px;text-align:center;">
      <div style="font-size:11px;color:var(--fg3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px;">Tonight · 19:00–23:00</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;">
        <div><div style="font-size:28px;font-weight:800;color:var(--amber);line-height:1;">3</div><div style="font-size:9px;color:var(--fg3);margin-top:4px;text-transform:uppercase;letter-spacing:0.06em;">Pending</div></div>
        <div><div style="font-size:28px;font-weight:800;color:#60a5fa;line-height:1;">2</div><div style="font-size:9px;color:var(--fg3);margin-top:4px;text-transform:uppercase;letter-spacing:0.06em;">At Door</div></div>
        <div><div style="font-size:28px;font-weight:800;color:var(--green);line-height:1;">18</div><div style="font-size:9px;color:var(--fg3);margin-top:4px;text-transform:uppercase;letter-spacing:0.06em;">In</div></div>
        <div><div style="font-size:28px;font-weight:800;color:var(--fg3);line-height:1;">1</div><div style="font-size:9px;color:var(--fg3);margin-top:4px;text-transform:uppercase;letter-spacing:0.06em;">Declined</div></div>
      </div>
    </div>

    <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px;">
      <div style="font-size:24px;">🍹</div>
      <div>
        <div style="font-size:13px;font-weight:700;color:var(--fg);">Free welcome drink</div>
        <div style="font-size:11px;color:var(--fg3);margin-top:2px;">18 / 30 claimed</div>
      </div>
    </div>

    <div class="section-label">APPROVAL REQUESTS</div>
    <div style="background:rgba(232,184,109,0.06);border:1px solid rgba(232,184,109,0.25);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;">
      <div style="flex:1;">
        <div style="font-size:15px;font-weight:700;color:var(--fg);">Marco</div>
        <div style="font-size:10px;color:var(--fg3);margin-top:3px;">Requested 20:14</div>
      </div>
      <div style="display:flex;gap:8px;flex-shrink:0;">
        <button style="background:rgba(248,113,113,0.15);color:#f87171;border:1px solid rgba(248,113,113,0.3);border-radius:var(--r-md);padding:8px 14px;font-size:12px;font-weight:700;">✕</button>
        <button style="background:var(--amber);color:#0D1117;border:none;border-radius:var(--r-md);padding:8px 16px;font-size:12px;font-weight:700;">Accept</button>
      </div>
    </div>
    <div style="background:rgba(232,184,109,0.06);border:1px solid rgba(232,184,109,0.25);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;">
      <div style="flex:1;">
        <div style="font-size:15px;font-weight:700;color:var(--fg);">Priya</div>
        <div style="font-size:10px;color:var(--fg3);margin-top:3px;">Requested 20:16</div>
      </div>
      <div style="display:flex;gap:8px;flex-shrink:0;">
        <button style="background:rgba(248,113,113,0.15);color:#f87171;border:1px solid rgba(248,113,113,0.3);border-radius:var(--r-md);padding:8px 14px;font-size:12px;font-weight:700;">✕</button>
        <button style="background:var(--amber);color:#0D1117;border:none;border-radius:var(--r-md);padding:8px 16px;font-size:12px;font-weight:700;">Accept</button>
      </div>
    </div>

    <div class="section-label">AT THE DOOR — SCAN CODE</div>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;">
      <div style="flex:1;">
        <div style="font-size:14px;font-weight:700;color:var(--fg);margin-bottom:2px;">Julien</div>
        <div style="font-size:18px;font-weight:800;color:#60a5fa;letter-spacing:2px;">PSL-4821</div>
        <div style="font-size:10px;color:var(--fg3);margin-top:3px;">20:05</div>
      </div>
      <button style="background:var(--green);color:#fff;border:none;border-radius:var(--r-md);padding:10px 18px;font-size:13px;font-weight:700;flex-shrink:0;">✓ Confirm</button>
    </div>

    <div class="section-label">CONFIRMED IN</div>
    <div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);opacity:0.6;">
      <div style="flex:1;">
        <div style="font-size:13px;font-weight:700;color:var(--fg);">Anna</div>
        <div style="font-size:12px;font-weight:700;color:var(--green);letter-spacing:1px;">PSL-3390</div>
      </div>
      <div style="font-size:10px;color:var(--fg3);">✓ 19:48</div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);opacity:0.6;">
      <div style="flex:1;">
        <div style="font-size:13px;font-weight:700;color:var(--fg);">Kenji</div>
        <div style="font-size:12px;font-weight:700;color:var(--green);letter-spacing:1px;">PSL-3102</div>
      </div>
      <div style="font-size:10px;color:var(--fg3);">✓ 19:32</div>
    </div>
  </div>
</main>
</body>
</html>
