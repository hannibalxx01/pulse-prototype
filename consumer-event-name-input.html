<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=430">
<title>Pulse — Event (Name Input)</title>
<link rel="stylesheet" href="pulse-design.css">
</head>
<body>
<main class="screen">
  <div class="topnav">
    <a class="topnav-back" href="consumer-event-idle.html">←</a>
    <div class="topnav-title">Amber Rooftop</div>
    <span></span>
  </div>

  <div class="scroll-body">
    <div style="background:linear-gradient(135deg,#1B2F4A,#0D1E30);border-radius:var(--r-lg);padding:28px 20px 24px;margin-bottom:12px;text-align:center;">
      <div style="font-size:48px;margin-bottom:12px;">🍹</div>
      <div style="font-family:'DM Serif Display',serif;font-size:26px;color:var(--fg);margin-bottom:6px;">Happy Hour</div>

      <input class="input" placeholder="Your first name" value="Marco" style="margin-bottom:12px;">
